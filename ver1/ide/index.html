<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSL1 IDE</title>

<!-- CodeMirror 5 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>

<!-- N3.js for RDF/Turtle parsing -->
<script src="https://unpkg.com/n3@1.17.2/browser/n3.min.js"></script>

<!-- vis-network for graph visualization -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">

<!-- Split.js for resizable panels -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>

<style>
  :root {
    --bg-primary:    #1e1e1e;
    --bg-secondary:  #252526;
    --bg-tertiary:   #2d2d30;
    --bg-panel:      #1e1e1e;
    --bg-input:      #3c3c3c;
    --bg-hover:      #2a2d2e;
    --bg-active:     #37373d;
    --bg-tab-active: #1e1e1e;
    --bg-tab:        #2d2d30;
    --border:        #3c3c3c;
    --border-focus:  #007acc;
    --text-primary:  #d4d4d4;
    --text-secondary:#9d9d9d;
    --text-muted:    #6d6d6d;
    --accent:        #007acc;
    --accent-hover:  #1a8ad4;
    --success:       #4ec9b0;
    --warning:       #dcdcaa;
    --error:         #f44747;
    --keyword:       #569cd6;
    --string:        #ce9178;
    --comment:       #6a9955;
    --toolbar-h:     42px;
    --tab-h:         35px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Toolbar ─── */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    user-select: none;
  }
  #toolbar .title {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    margin-right: 8px;
    letter-spacing: .5px;
  }
  #toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  .btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-active); border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: #0e7a0d; border-color: #3cb53b; }
  .btn-success:hover { background: #127811; }

  /* ─── Main layout ─── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }

  /* Split.js gutter */
  .gutter {
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
  }
  .gutter:hover { background: var(--accent); }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    background: var(--bg-tab);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 0 16px;
    height: var(--tab-h);
    line-height: var(--tab-h);
    cursor: pointer;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    font-size: 12px;
    white-space: nowrap;
    transition: color .15s;
  }
  .tab:hover { color: var(--text-primary); background: var(--bg-hover); }
  .tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent);
    background: var(--bg-tab-active);
  }

  .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; min-height: 0; }
  .tab-content.active { display: flex; }

  /* ─── Panel headers ─── */
  .panel-header {
    padding: 6px 12px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .panel-header .actions { display: flex; gap: 4px; }
  .panel-header .actions button {
    padding: 2px 8px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    border-radius: 2px;
    cursor: pointer;
  }
  .panel-header .actions button:hover { border-color: var(--accent); background: var(--bg-active); }

  /* ─── Left panel – Ontology Editor ─── */
  #left-panel { border-right: 1px solid var(--border); }

  .class-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .tree-node {
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tree-node:hover { background: var(--bg-hover); }
  .tree-node.selected { background: var(--bg-active); color: var(--accent); }
  .tree-node .icon { font-size: 11px; color: var(--text-muted); }
  .tree-node .label { flex: 1; }
  .tree-node .count { font-size: 10px; color: var(--text-muted); background: var(--bg-input); border-radius: 8px; padding: 0 5px; }
  .tree-indent { padding-left: 16px; }

  .form-group { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .form-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 3px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .individuals-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .individual-item {
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid transparent;
  }
  .individual-item:hover { background: var(--bg-hover); }
  .individual-item.selected { background: var(--bg-active); color: var(--success); }

  /* Graph container */
  #onto-graph {
    flex: 1;
    min-height: 0;
    background: var(--bg-primary);
  }

  /* Turtle textarea */
  #turtle-textarea {
    width: 100%;
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: none;
    padding: 10px;
    font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    font-size: 12px;
    resize: none;
    outline: none;
  }

  /* ─── Middle panel – Code Editor ─── */
  #mid-panel { border-right: 1px solid var(--border); }

  .CodeMirror {
    height: 100% !important;
    font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .CodeMirror-scroll { overflow-y: auto !important; }

  /* ─── Right panel – Output ─── */
  #right-panel {}

  #generated-js-editor .CodeMirror { background: #1a1a1a; }

  #preview-iframe {
    flex: 1;
    border: none;
    background: #fff;
    min-height: 0;
  }

  #console-output {
    height: 120px;
    background: #0d0d0d;
    color: #a8ff60;
    font-family: Consolas, monospace;
    font-size: 11px;
    padding: 8px;
    overflow-y: auto;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  #console-output .log-line { padding: 1px 0; }
  #console-output .log-err { color: var(--error); }
  #console-output .log-warn { color: var(--warning); }
  #console-output .log-ok { color: var(--success); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Status bar */
  #statusbar {
    height: 22px;
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: #fff;
    gap: 16px;
    flex-shrink: 0;
  }
  #statusbar .status-item { opacity: .85; }
  #statusbar .status-item.sep { opacity: .4; }

  /* vis-network dark overrides */
  .vis-network canvas { background: var(--bg-primary) !important; }
</style>
</head>
<body>

<!-- ═══════════════════════════ TOOLBAR ═══════════════════════════ -->
<div id="toolbar">
  <span class="title">DSL1 IDE</span>
  <div class="sep"></div>
  <button class="btn" onclick="IDE.newWorkspace()">New</button>
  <button class="btn" onclick="IDE.openFile()">Open</button>
  <button class="btn" onclick="IDE.saveWorkspace()">Save</button>
  <div class="sep"></div>
  <button class="btn btn-primary" onclick="IDE.translate()">&#9654; Translate</button>
  <button class="btn btn-success" onclick="IDE.runPreview()">&#9654; Run Preview</button>
  <button class="btn" onclick="IDE.exportJS()">&#8595; Export HTML</button>
  <div class="sep"></div>
  <span id="toolbar-status" style="font-size:11px;color:var(--text-secondary);">Ready</span>
</div>

<!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
<div id="main">

  <!-- LEFT PANEL: Ontology Editor -->
  <div class="panel" id="left-panel">
    <div class="tabs" id="onto-tabs">
      <div class="tab active" onclick="IDE.switchOntoTab('types')">Types/Classes</div>
      <div class="tab" onclick="IDE.switchOntoTab('individuals')">Individuals</div>
      <div class="tab" onclick="IDE.switchOntoTab('graph')">Graph View</div>
      <div class="tab" onclick="IDE.switchOntoTab('turtle')">Turtle</div>
    </div>

    <!-- Types tab -->
    <div class="tab-content active" id="tab-types">
      <div class="panel-header">
        <span>Classes &amp; Properties</span>
        <div class="actions">
          <button onclick="IDE.addClass()">+ Class</button>
          <button onclick="IDE.addProperty()">+ Property</button>
        </div>
      </div>
      <div class="class-tree" id="class-tree"></div>
      <div id="class-edit-form" style="border-top:1px solid var(--border);display:none;">
        <div class="form-group">
          <label>Class IRI / Name</label>
          <input type="text" id="edit-class-iri" placeholder="calc:MyClass">
        </div>
        <div class="form-group">
          <label>rdfs:label</label>
          <input type="text" id="edit-class-label" placeholder="My Class">
        </div>
        <div class="form-group">
          <label>rdfs:comment</label>
          <textarea id="edit-class-comment" rows="2" placeholder="Description..."></textarea>
        </div>
        <div class="form-group">
          <label>rdfs:subClassOf</label>
          <input type="text" id="edit-class-parent" placeholder="owl:Thing">
        </div>
        <div style="padding:6px 10px;display:flex;gap:6px;">
          <button class="btn btn-primary" style="flex:1" onclick="IDE.saveClassEdit()">Save</button>
          <button class="btn" onclick="IDE.cancelClassEdit()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Individuals tab -->
    <div class="tab-content" id="tab-individuals">
      <div class="panel-header">
        <span>Individuals</span>
        <div class="actions">
          <button onclick="IDE.addIndividual()">+ Add</button>
          <button onclick="IDE.deleteIndividual()">&#10005; Del</button>
        </div>
      </div>
      <div class="form-group">
        <label>Filter by Class</label>
        <select id="individual-class-filter" onchange="IDE.filterIndividuals()">
          <option value="">-- All Classes --</option>
        </select>
      </div>
      <div class="individuals-list" id="individuals-list"></div>
    </div>

    <!-- Graph tab -->
    <div class="tab-content" id="tab-graph">
      <div class="panel-header">
        <span>Ontology Graph</span>
        <div class="actions">
          <button onclick="IDE.refreshGraph()">&#8635; Refresh</button>
        </div>
      </div>
      <div id="onto-graph"></div>
    </div>

    <!-- Turtle tab -->
    <div class="tab-content" id="tab-turtle">
      <div class="panel-header">
        <span>Turtle Source</span>
        <div class="actions">
          <button onclick="IDE.parseTurtle()">Parse</button>
        </div>
      </div>
      <textarea id="turtle-textarea" spellcheck="false"></textarea>
    </div>
  </div>

  <!-- MIDDLE PANEL: Code Editor -->
  <div class="panel" id="mid-panel">
    <div class="tabs">
      <div class="tab active" onclick="IDE.switchCodeTab('dsl')">DSL (PL/SPARQL)</div>
      <div class="tab" onclick="IDE.switchCodeTab('uidsl')">UI DSL</div>
    </div>
    <div class="tab-content active" id="tab-dsl" style="flex:1;min-height:0;">
      <textarea id="dsl-editor-raw"></textarea>
    </div>
    <div class="tab-content" id="tab-uidsl" style="flex:1;min-height:0;">
      <textarea id="uidsl-editor-raw"></textarea>
    </div>
  </div>

  <!-- RIGHT PANEL: Output -->
  <div class="panel" id="right-panel">
    <div class="tabs">
      <div class="tab active" onclick="IDE.switchOutputTab('js')">Generated JS</div>
      <div class="tab" onclick="IDE.switchOutputTab('preview')">Preview</div>
    </div>
    <div class="tab-content active" id="tab-genjs" style="flex:1;min-height:0;">
      <textarea id="genjs-editor-raw" readonly></textarea>
    </div>
    <div class="tab-content" id="tab-preview" style="flex:1;min-height:0;flex-direction:column;">
      <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      <div id="console-output">
        <div class="log-line log-ok">DSL1 IDE console ready.</div>
      </div>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <span class="status-item" id="sb-mode">DSL Mode</span>
  <span class="status-item sep">|</span>
  <span class="status-item" id="sb-triples">0 triples</span>
  <span class="status-item sep">|</span>
  <span class="status-item" id="sb-lines">Ln 1, Col 1</span>
  <span class="status-item sep">|</span>
  <span class="status-item">DSL1 v1.0</span>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" style="display:none" accept=".ttl,.dsl,.uidsl,.json">

<script>
/* ═══════════════════════════════════════════════════════════════════
   1. DEFINE CODEMIRROR MODES
═══════════════════════════════════════════════════════════════════ */
CodeMirror.defineSimpleMode('dsl1', {
  start: [
    { regex: /\/\/.*/, token: 'comment' },
    { regex: /\/\*/, token: 'comment', next: 'comment' },
    { regex: /"(?:[^\\]|\\.)*?(?:"|$)/, token: 'string' },
    { regex: /'(?:[^\\]|\\.)*?(?:'|$)/, token: 'string' },
    { regex: /<[^>]+>/, token: 'string-2' },
    { regex: /\b(FUNCTION|SELECT|WHERE|INSERT|DELETE|FROM|GRAPH|PREFIX|USE|RETURN|ORDER\s+BY|LIMIT|OPTIONAL|FILTER|UNION|BIND|GENERATE_IRI|GROUP\s+BY|AS|COUNT|ASC|DESC)\b/, token: 'keyword' },
    { regex: /\b(la-if|la-forEach|la-switch|la-try|la-throw|map|filter|reduce|let|const|return|typeof|null|true|false|NOW|STRING|NUMBER|ROUND)\b/, token: 'keyword' },
    { regex: /\b(a|rdf|rdfs|owl|xsd|dsl|calc)\b/, token: 'keyword' },
    { regex: /[A-Za-z_][A-Za-z0-9_]*:/, token: 'tag' },
    { regex: /\?[A-Za-z_][A-Za-z0-9_]*/, token: 'variable-2' },
    { regex: /[0-9]+(?:\.[0-9]+)?/, token: 'number' },
    { regex: /[{}()[\]]/, token: 'bracket' },
    { regex: /[.;,]/, token: 'punctuation' },
  ],
  comment: [
    { regex: /.*?\*\//, token: 'comment', next: 'start' },
    { regex: /.*/, token: 'comment' }
  ],
  meta: { dontIndentStates: ['comment'], lineComment: '//' }
});

CodeMirror.defineSimpleMode('uidsl', {
  start: [
    { regex: /\/\/.*/, token: 'comment' },
    { regex: /\/\*/, token: 'comment', next: 'comment' },
    { regex: /"(?:[^\\]|\\.)*?(?:"|$)/, token: 'string' },
    { regex: /'(?:[^\\]|\\.)*?(?:'|$)/, token: 'string' },
    { regex: /\b(WINDOW|BUTTON|FIELD|DROPDOWN|MULTISELECT|LISTVIEW|LABEL|CANVAS|BIND\s+TO|ON\s+CLICK|ON\s+CHANGE|NAVIGATE\s+TO|TITLE|SELECTION|COLUMNS|READONLY|TYPE|USE|SHOW|ALERT|CONFIRM|REFRESH|AUTO_REFRESH|STYLE|WIDTH|HEIGHT|RESIZABLE|DISPLAY|VALUE|HEADER|ALIGN|FORMAT|PLACEHOLDER|REQUIRED|EMPTY_MESSAGE|ORDER)\b/, token: 'keyword' },
    { regex: /\b(la-if|la-forEach|let|const|return|null|true|false|NUMBER|STRING)\b/, token: 'keyword' },
    { regex: /\?[A-Za-z_][A-Za-z0-9_]*/, token: 'variable-2' },
    { regex: /[A-Za-z_][A-Za-z0-9_]*:/, token: 'tag' },
    { regex: /[0-9]+(?:\.[0-9]+)?/, token: 'number' },
    { regex: /[{}()[\]]/, token: 'bracket' },
    { regex: /[.;,]/, token: 'punctuation' },
  ],
  comment: [
    { regex: /.*?\*\//, token: 'comment', next: 'start' },
    { regex: /.*/, token: 'comment' }
  ],
  meta: { dontIndentStates: ['comment'], lineComment: '//' }
});

/* ═══════════════════════════════════════════════════════════════════
   2. EXAMPLE CONTENT
═══════════════════════════════════════════════════════════════════ */
const EXAMPLE_TURTLE = `@base <https://github.com/bpmbpm/DSL1/ontology/calculator#> .

@prefix owl:   <http://www.w3.org/2002/07/owl#> .
@prefix rdf:   <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .
@prefix rdfs:  <http://www.w3.org/2000/01/rdf-schema#> .
@prefix xsd:   <http://www.w3.org/2001/XMLSchema#> .
@prefix dsl:   <https://github.com/bpmbpm/DSL1/ontology#> .
@prefix calc:  <https://github.com/bpmbpm/DSL1/ontology/calculator#> .

calc:Calculator
    a owl:Class ;
    rdfs:label "Calculator" ;
    rdfs:subClassOf dsl:Application .

calc:Operation
    a owl:Class ;
    rdfs:label "Operation" ;
    rdfs:subClassOf dsl:Process .

calc:Operand
    a owl:Class ;
    rdfs:label "Operand" ;
    rdfs:subClassOf dsl:Value .

calc:Result
    a owl:Class ;
    rdfs:label "Result" ;
    rdfs:subClassOf dsl:Value .

calc:Button
    a owl:Class ;
    rdfs:label "Button" .

calc:Display
    a owl:Class ;
    rdfs:label "Display" .

calc:hasOperand1
    a owl:ObjectProperty ;
    rdfs:label "has operand 1" ;
    rdfs:domain calc:Result ;
    rdfs:range  calc:Operand .

calc:hasOperand2
    a owl:ObjectProperty ;
    rdfs:label "has operand 2" ;
    rdfs:domain calc:Result ;
    rdfs:range  calc:Operand .

calc:hasOperationType
    a owl:ObjectProperty ;
    rdfs:domain calc:Result ;
    rdfs:range  calc:Operation .

calc:operationName
    a owl:DatatypeProperty ;
    rdfs:domain calc:Operation ;
    rdfs:range  xsd:string .

calc:operationSymbol
    a owl:DatatypeProperty ;
    rdfs:domain calc:Operation ;
    rdfs:range  xsd:string .

calc:operandValue
    a owl:DatatypeProperty ;
    rdfs:domain calc:Operand ;
    rdfs:range  xsd:decimal .

calc:resultValue
    a owl:DatatypeProperty ;
    rdfs:domain calc:Result ;
    rdfs:range  xsd:decimal .

calc:resultTimestamp
    a owl:DatatypeProperty ;
    rdfs:domain calc:Result ;
    rdfs:range  xsd:dateTime .

calc:addOperation
    a calc:Operation , owl:NamedIndividual ;
    rdfs:label "Addition" ;
    calc:operationName   "add" ;
    calc:operationSymbol "+" ;
    dsl:order 1 .

calc:subtractOperation
    a calc:Operation , owl:NamedIndividual ;
    rdfs:label "Subtraction" ;
    calc:operationName   "subtract" ;
    calc:operationSymbol "-" ;
    dsl:order 2 .

calc:multiplyOperation
    a calc:Operation , owl:NamedIndividual ;
    rdfs:label "Multiplication" ;
    calc:operationName   "multiply" ;
    calc:operationSymbol "*" ;
    dsl:order 3 .

calc:divideOperation
    a calc:Operation , owl:NamedIndividual ;
    rdfs:label "Division" ;
    calc:operationName   "divide" ;
    calc:operationSymbol "/" ;
    dsl:order 4 .

calc:calculatorApp
    a calc:Calculator , owl:NamedIndividual ;

`;

const EXAMPLE_DSL = `// Calculator Application - PL/SPARQL DSL
PREFIX calc: <https://github.com/bpmbpm/DSL1/ontology/calculator#>
PREFIX dsl:  <https://github.com/bpmbpm/DSL1/ontology#>
PREFIX xsd:  <http://www.w3.org/2001/XMLSchema#>

USE GRAPH <calculator>

FUNCTION getOperations() {
  SELECT ?op ?label ?symbol ?orderVal WHERE {
    GRAPH <calculator> {
      ?op a calc:Operation .
      ?op calc:operationName   ?label .
      ?op calc:operationSymbol ?symbol .
      ?op dsl:order            ?orderVal .
    }
  }
  ORDER BY ASC(?orderVal)
}

FUNCTION calculate(operand1, operand2, operationType) {
  la-if (operand1 === null || operand2 === null) {
    return "Error: Both operands are required"
  }
  la-if (operationType === null || operationType === "") {
    return "Error: Please select an operation"
  }
  la-if (operationType === "add") {
    return operand1 + operand2
  }
  la-if (operationType === "subtract") {
    return operand1 - operand2
  }
  la-if (operationType === "multiply") {
    return operand1 * operand2
  }
  la-if (operationType === "divide") {
    la-if (operand2 === 0) {
      return "Error: Division by zero"
    }
    return operand1 / operand2
  }
  return "Error: Unknown operation: " + operationType
}

FUNCTION storeResult(operand1, operand2, operationType, result) {
  la-if (typeof result === "string" && result.startsWith("Error")) {
    return null
  }
  let resultId   = GENERATE_IRI(calc:Result)
  let operand1Id = GENERATE_IRI(calc:Operand)
  let operand2Id = GENERATE_IRI(calc:Operand)
  let timestamp  = NOW()
  INSERT INTO GRAPH <calculator> {
    resultId   a calc:Result .
    resultId   calc:hasOperand1      operand1Id .
    resultId   calc:hasOperand2      operand2Id .
    resultId   calc:hasOperationType operationType .
    resultId   calc:resultValue      result .
    resultId   calc:resultTimestamp  timestamp .
    operand1Id a calc:Operand .
    operand1Id calc:operandValue operand1 .
    operand2Id a calc:Operand .
    operand2Id calc:operandValue operand2 .
  }
  return resultId
}

FUNCTION getHistory() {
  SELECT ?result ?op1Val ?symbol ?op2Val ?resultVal ?timestamp WHERE {
    GRAPH <calculator> {
      ?result   a calc:Result .
      ?result   calc:hasOperand1      ?op1 .
      ?result   calc:hasOperand2      ?op2 .
      ?result   calc:hasOperationType ?opType .
      ?result   calc:resultValue      ?resultVal .
      ?result   calc:resultTimestamp  ?timestamp .
      ?op1      calc:operandValue     ?op1Val .
      ?op2      calc:operandValue     ?op2Val .
      ?opType   calc:operationSymbol  ?symbol .
    }
  }
  ORDER BY DESC(?timestamp)
  LIMIT 10
}

FUNCTION getHistoryCount() {
  SELECT (COUNT(?result) AS ?total) WHERE {
    GRAPH <calculator> {
      ?result a calc:Result .
    }
  }
}

FUNCTION clearHistory() {
  DELETE FROM GRAPH <calculator> {
    ?result   a calc:Result .
    ?result   calc:hasOperand1      ?op1 .
    ?result   calc:hasOperand2      ?op2 .
    ?result   calc:hasOperationType ?opType .
    ?result   calc:resultValue      ?resultVal .
    ?result   calc:resultTimestamp  ?timestamp .
    ?op1      a calc:Operand .
    ?op1      calc:operandValue ?op1Val .
    ?op2      a calc:Operand .
    ?op2      calc:operandValue ?op2Val .
  }
  WHERE {
    GRAPH <calculator> {
      ?result   a calc:Result .
      OPTIONAL { ?result calc:hasOperand1 ?op1 }
      OPTIONAL { ?result calc:hasOperand2 ?op2 }
      OPTIONAL { ?result calc:hasOperationType ?opType }
      OPTIONAL { ?result calc:resultValue ?resultVal }
      OPTIONAL { ?result calc:resultTimestamp ?timestamp }
      OPTIONAL { ?op1   calc:operandValue ?op1Val }
      OPTIONAL { ?op2   calc:operandValue ?op2Val }
    }
  }
  return true
}
`;

/* ═══════════════════════════════════════════════════════════════════
   3. TRANSLATOR
═══════════════════════════════════════════════════════════════════ */
const Translator = {

  /* ── DSL → JS ────────────────────────────────────────────────── */
  translateDSL(src) {
    const lines = [];
    lines.push('// === DSL1 Generated Functions ===');
    lines.push('const _store = new N3.Store();');
    lines.push('const _prefixes = {};');
    lines.push('let _iriCounter = 0;');
    lines.push('');
    lines.push('function GENERATE_IRI(ns) {');
    lines.push('  _iriCounter++;');
    lines.push('  const base = (ns || "http://example.org/") + "";');
    lines.push('  const clean = base.replace(/[:_]/g,"_");');
    lines.push('  return clean + "_" + Date.now() + "_" + _iriCounter;');
    lines.push('}');
    lines.push('function NOW() { return new Date().toISOString(); }');
    lines.push('function ROUND(v,d) { return Math.round(v * Math.pow(10,d)) / Math.pow(10,d); }');
    lines.push('function STRING(v) { return String(v); }');
    lines.push('function NUMBER(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }');
    lines.push('');

    // Remove comment lines
    let code = src.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');

    // Parse PREFIX declarations
    const prefixRe = /PREFIX\s+([a-z_]+):\s*<([^>]+)>/gi;
    let m;
    while ((m = prefixRe.exec(code)) !== null) {
      lines.push(`_prefixes["${m[1]}"] = "${m[2]}";`);
    }
    lines.push('');

    // Parse FUNCTION blocks
    const funcRe = /FUNCTION\s+(\w+)\s*\(([^)]*)\)\s*\{/g;
    let pos = 0;
    while ((m = funcRe.exec(code)) !== null) {
      const name = m[1];
      const params = m[2].trim();
      const bodyStart = m.index + m[0].length;
      const body = this._extractBlock(code, bodyStart);
      const jsBody = this._translateFunctionBody(body);
      lines.push(`function ${name}(${params}) {`);
      lines.push(jsBody);
      lines.push('}');
      lines.push('');
    }

    return lines.join('\n');
  },

  _extractBlock(code, start) {
    let depth = 1;
    let i = start;
    let result = '';
    while (i < code.length && depth > 0) {
      if (code[i] === '{') depth++;
      else if (code[i] === '}') {
        depth--;
        if (depth === 0) break;
      }
      result += code[i];
      i++;
    }
    return result;
  },

  _translateFunctionBody(body) {
    let out = body;

    // la-if → if
    out = out.replace(/\bla-if\s*\(/g, 'if (');

    // la-forEach (item in items) → items.forEach(item => {
    out = out.replace(/\bla-forEach\s*\((\w+)\s+in\s+(\w+)\)\s*\{/g,
      (_, item, arr) => `${arr}.forEach(function(${item}) {`);

    // la-forEach (items AS ?row) → items.forEach(function(?row) {
    out = out.replace(/\bla-forEach\s*\((\w+)\s+AS\s+(\?\w+)\)\s*\{/g,
      (_, arr, row) => `${arr}.forEach(function(${row.replace('?','_')}) {`);

    // GENERATE_IRI(calc:X) → GENERATE_IRI("calc:X")
    out = out.replace(/GENERATE_IRI\(([^)]+)\)/g, (_, ns) => `GENERATE_IRI("${ns.trim()}")`);

    // SELECT...WHERE{...} ORDER BY ... LIMIT ... → inline array query
    out = this._translateSELECT(out);

    // INSERT INTO GRAPH <name> { ... }
    out = this._translateINSERT(out);

    // DELETE FROM GRAPH <name> { ... } WHERE { ... }
    out = this._translateDELETE(out);

    return out;
  },

  _translateSELECT(body) {
    // Simplified: replace SELECT...WHERE{...}[ORDER BY...][LIMIT n] with _queryStore(...)
    const selectRe = /SELECT\s+([\s\S]+?)\s+WHERE\s*\{([\s\S]+?)\}((?:\s*(?:ORDER\s+BY|GROUP\s+BY|LIMIT|HAVING)[^\n{]*)*)(?=\s*(?:return|let|const|la-if|if|\}|$))/gi;
    return body.replace(selectRe, (full, projection, pattern, modifiers) => {
      const proj = projection.trim().replace(/\s+/g, ' ');
      const vars = (proj.match(/\?\w+/g) || []).map(v => v.slice(1));
      const filterMatch = pattern.match(/FILTER\s*\(([^)]+)\)/i);
      const limitMatch = modifiers.match(/LIMIT\s+(\d+)/i);
      const orderMatch = modifiers.match(/ORDER\s+BY\s+(ASC|DESC)?\s*\(?(\?\w+)\)?/i);
      const limitN = limitMatch ? parseInt(limitMatch[1]) : null;

      const lines = [];
      lines.push(`(function() {`);
      lines.push(`  const _results = [];`);
      lines.push(`  _store.forEach(function(q) {`);
      lines.push(`    const _row = {};`);
      lines.push(`    // Pattern: ${pattern.trim().replace(/\s+/g,' ').slice(0,80)}`);
      lines.push(`    _row._s = q.subject.value;`);
      lines.push(`    _row._p = q.predicate.value;`);
      lines.push(`    _row._o = q.object.value;`);
      if (vars.length > 0) {
        lines.push(`    // Binding projected vars: ${vars.join(', ')}`);
        vars.forEach(v => lines.push(`    _row.${v} = _row._o; // simplified binding`));
      }
      lines.push(`    _results.push(_row);`);
      lines.push(`  });`);
      if (orderMatch) {
        const dir = (orderMatch[1] || 'ASC').toUpperCase();
        const v = orderMatch[2].slice(1);
        lines.push(`  _results.sort((a,b) => ${dir === 'DESC' ? '-1' : '1'} * String(a.${v}||'').localeCompare(String(b.${v}||'')));`);
      }
      if (limitN) lines.push(`  return _results.slice(0, ${limitN});`);
      else lines.push(`  return _results;`);
      lines.push(`})()`);
      return lines.join('\n');
    });
  },

  _translateINSERT(body) {
    const re = /INSERT\s+INTO\s+GRAPH\s*<([^>]+)>\s*\{([\s\S]+?)\}(?:\s*WHERE\s*\{[\s\S]+?\})?/gi;
    return body.replace(re, (full, graph, triples) => {
      const lines = [`// INSERT INTO GRAPH <${graph}>`];
      const tripleLines = triples.trim().split(/\s*\.\s*/);
      tripleLines.forEach(tl => {
        const parts = tl.trim().split(/\s+/);
        if (parts.length >= 3) {
          const s = parts[0], p = parts[1], o = parts.slice(2).join(' ');
          lines.push(`_store.addQuad(N3.DataFactory.quad(`);
          lines.push(`  N3.DataFactory.namedNode(String(${this._termToJS(s)})),`);
          lines.push(`  N3.DataFactory.namedNode(String(${this._termToJS(p)})),`);
          lines.push(`  ${this._objectToJS(o)},`);
          lines.push(`  N3.DataFactory.namedNode("${graph}")`);
          lines.push(`));`);
        }
      });
      return lines.join('\n');
    });
  },

  _translateDELETE(body) {
    const re = /DELETE\s+FROM\s+GRAPH\s*<([^>]+)>\s*\{([\s\S]+?)\}\s*WHERE\s*\{([\s\S]+?)\}/gi;
    return body.replace(re, (full, graph, deletePattern, wherePattern) => {
      return `// DELETE FROM GRAPH <${graph}>\n_store.removeMatches(null,null,null,N3.DataFactory.namedNode("${graph}"));`;
    });
  },

  _termToJS(term) {
    term = term.trim();
    if (term.startsWith('?')) return term.slice(1);
    if (/^[a-z_]+:[A-Za-z]/.test(term)) return `(_prefixes["${term.split(':')[0]}"] || "") + "${term.split(':').slice(1).join(':')}"`;
    if (term.startsWith('<') && term.endsWith('>')) return `"${term.slice(1,-1)}"`;
    return `String(${term})`;
  },

  _objectToJS(term) {
    term = term.trim();
    if (term.startsWith('"') || term.startsWith("'")) return `N3.DataFactory.literal(${term})`;
    if (/^\d/.test(term)) return `N3.DataFactory.literal("${term}", N3.DataFactory.namedNode("http://www.w3.org/2001/XMLSchema#decimal"))`;
    return `N3.DataFactory.namedNode(String(${this._termToJS(term)}))`;
  },

  /* ── UI DSL → HTML + JS ─────────────────────────────────────── */
  translateUIDSL(src) {
    const windows = this._parseWindows(src);
    const htmlParts = [];
    const jsParts = [];

    windows.forEach(win => {
      htmlParts.push(this._generateWindowHTML(win));
      jsParts.push(this._generateWindowJS(win));
    });

    return { html: htmlParts.join('\n'), js: jsParts.join('\n') };
  },

  _parseWindows(src) {
    const windows = [];
    const re = /WINDOW\s+(\w+)\s*\{/g;
    let m;
    while ((m = re.exec(src)) !== null) {
      const name = m[1];
      const bodyStart = m.index + m[0].length;
      const body = this._extractBlock(src, bodyStart);
      const win = { name, title: name, width: 480, height: 640, elements: [] };

      // TITLE
      const titleM = body.match(/TITLE\s+"([^"]+)"/);
      if (titleM) win.title = titleM[1];
      const widthM = body.match(/WIDTH\s+(\d+)/);
      if (widthM) win.width = parseInt(widthM[1]);
      const heightM = body.match(/HEIGHT\s+(\d+)/);
      if (heightM) win.height = parseInt(heightM[1]);

      // Parse elements
      win.elements = this._parseElements(body);
      windows.push(win);
    }
    return windows;
  },

  _parseElements(body) {
    const elements = [];
    const elRe = /\b(FIELD|BUTTON|DROPDOWN|MULTISELECT|LISTVIEW|LABEL)\s+(\w+)\s*\{/g;
    let m;
    while ((m = elRe.exec(body)) !== null) {
      const type = m[1];
      const name = m[2];
      const eStart = m.index + m[0].length;
      const eBody = this._extractBlock(body, eStart);
      const el = { type, name };

      const lbl = eBody.match(/LABEL\s+"([^"]+)"/);
      if (lbl) el.label = lbl[1];
      const typ = eBody.match(/TYPE\s+(\w+)/);
      if (typ) el.inputType = typ[1];
      const ph = eBody.match(/PLACEHOLDER\s+"([^"]+)"/);
      if (ph) el.placeholder = ph[1];
      const ro = eBody.match(/READONLY\s+true/);
      if (ro) el.readonly = true;
      const bindTo = eBody.match(/BIND\s+TO\s+(\w+)\(\)/);
      if (bindTo) el.bindTo = bindTo[1];
      const displayV = eBody.match(/DISPLAY\s+(?:"([^"]+)"\s*\+\s*)?(\?\w+)/);
      if (displayV) el.displayVar = displayV[2];
      const valueV = eBody.match(/VALUE\s+(\?\w+)/);
      if (valueV) el.valueVar = valueV[1];
      const emptyMsg = eBody.match(/EMPTY_MESSAGE\s+"([^"]+)"/);
      if (emptyMsg) el.emptyMessage = emptyMsg[1];
      const style = eBody.match(/STYLE\s+"([^"]+)"/);
      if (style) el.style = style[1];
      const order = eBody.match(/ORDER\s+(\d+)/);
      if (order) el.order = parseInt(order[1]);
      const req = eBody.match(/REQUIRED\s+true/);
      if (req) el.required = true;
      const autoRefresh = eBody.match(/AUTO_REFRESH\s+true/);
      if (autoRefresh) el.autoRefresh = true;

      // COLUMNS for LISTVIEW
      if (type === 'LISTVIEW') {
        const cols = [];
        const colRe = /\{[^}]*HEADER\s+"([^"]+)"[^}]*VALUE\s+(\?\w+)[^}]*(?:WIDTH\s+(\d+))?[^}]*\}/g;
        let cm;
        while ((cm = colRe.exec(eBody)) !== null) {
          cols.push({ header: cm[1], value: cm[2], width: cm[3] || 100 });
        }
        el.columns = cols;
      }

      // ON CLICK for BUTTON
      if (type === 'BUTTON') {
        const clickM = eBody.match(/ON\s+CLICK\s*\{([\s\S]+)/);
        if (clickM) {
          el.onClick = this._extractBlock(clickM[1], 0);
        }
      }

      elements.push(el);
    }
    return elements;
  },

  _generateWindowHTML(win) {
    const lines = [`<div id="${win.name}" class="dsl-window">`];
    lines.push(`  <h2 class="window-title">${this._esc(win.title)}</h2>`);

    win.elements.forEach(el => {
      switch (el.type) {
        case 'FIELD':
          lines.push(`  <div class="form-group">`);
          if (el.label) lines.push(`    <label for="${el.name}">${this._esc(el.label)}</label>`);
          const roAttr = el.readonly ? ' readonly' : '';
          const reqAttr = el.required ? ' required' : '';
          const phAttr = el.placeholder ? ` placeholder="${this._esc(el.placeholder)}"` : '';
          lines.push(`    <input type="${el.inputType || 'text'}" id="${el.name}"${phAttr}${roAttr}${reqAttr} class="dsl-input">`);
          lines.push(`  </div>`);
          break;

        case 'DROPDOWN':
          lines.push(`  <div class="form-group">`);
          if (el.label) lines.push(`    <label for="${el.name}">${this._esc(el.label)}</label>`);
          lines.push(`    <select id="${el.name}" class="dsl-select">`);
          lines.push(`      <option value="">-- Select --</option>`);
          lines.push(`    </select>`);
          lines.push(`  </div>`);
          break;

        case 'BUTTON':
          const btnClass = el.style ? `dsl-btn ${el.style}` : 'dsl-btn';
          lines.push(`  <button id="${el.name}" class="${btnClass}" onclick="_handler_${el.name}(event)">`);
          lines.push(`    ${this._esc(el.label || el.name)}`);
          lines.push(`  </button>`);
          break;

        case 'LABEL':
          lines.push(`  <div id="${el.name}" class="dsl-label"></div>`);
          break;

        case 'LISTVIEW':
          lines.push(`  <div class="listview-wrapper">`);
          if (el.label) lines.push(`    <div class="listview-label">${this._esc(el.label)}</div>`);
          lines.push(`    <table id="${el.name}" class="dsl-table">`);
          if (el.columns && el.columns.length) {
            lines.push(`      <thead><tr>`);
            el.columns.forEach(c => lines.push(`        <th style="width:${c.width}px">${this._esc(c.header)}</th>`));
            lines.push(`      </tr></thead>`);
          }
          lines.push(`      <tbody id="${el.name}_body"></tbody>`);
          lines.push(`    </table>`);
          lines.push(`  </div>`);
          break;
      }
    });

    lines.push('</div>');
    return lines.join('\n');
  },

  _generateWindowJS(win) {
    const lines = [];
    lines.push(`// === Window: ${win.name} ===`);

    win.elements.forEach(el => {
      // Data binding initialization
      if (el.bindTo && (el.type === 'DROPDOWN' || el.type === 'LISTVIEW' || el.type === 'LABEL')) {
        lines.push(`function _populate_${el.name}() {`);
        lines.push(`  try {`);
        lines.push(`    const _data = typeof ${el.bindTo} === 'function' ? ${el.bindTo}() : [];`);

        if (el.type === 'DROPDOWN') {
          const dv = el.displayVar ? el.displayVar.slice(1) : 'label';
          const vv = el.valueVar ? el.valueVar.slice(1) : 'value';
          lines.push(`    const _sel = document.getElementById("${el.name}");`);
          lines.push(`    _sel.innerHTML = '<option value="">-- Select --</option>';`);
          lines.push(`    (_data||[]).forEach(function(row){`);
          lines.push(`      const opt = document.createElement('option');`);
          lines.push(`      opt.value = row.${vv} || row._o || '';`);
          lines.push(`      opt.textContent = row.${dv} || row._o || '';`);
          lines.push(`      _sel.appendChild(opt);`);
          lines.push(`    });`);
        } else if (el.type === 'LISTVIEW') {
          lines.push(`    const _tbody = document.getElementById("${el.name}_body");`);
          lines.push(`    _tbody.innerHTML = '';`);
          lines.push(`    if (!_data || !_data.length) {`);
          const emptyMsg = el.emptyMessage || 'No data.';
          const colCount = (el.columns || []).length || 1;
          lines.push(`      _tbody.innerHTML = '<tr><td colspan="${colCount}" style="text-align:center;color:#888">${this._esc(emptyMsg)}</td></tr>';`);
          lines.push(`    } else {`);
          lines.push(`      (_data||[]).forEach(function(row){`);
          lines.push(`        const tr = document.createElement('tr');`);
          if (el.columns && el.columns.length) {
            el.columns.forEach(c => {
              const v = c.value.slice(1);
              lines.push(`        const td_${v} = document.createElement('td');`);
              lines.push(`        td_${v}.textContent = row.${v} !== undefined ? row.${v} : (row._o || '');`);
              lines.push(`        tr.appendChild(td_${v});`);
            });
          }
          lines.push(`        _tbody.appendChild(tr);`);
          lines.push(`      });`);
          lines.push(`    }`);
        } else if (el.type === 'LABEL') {
          lines.push(`    const _el = document.getElementById("${el.name}");`);
          lines.push(`    if (_el) { const _row = (_data||[])[0] || {}; _el.textContent = String(_row._o || '0'); }`);
        }

        lines.push(`  } catch(e) { console.error("${el.name} bind error:", e); }`);
        lines.push(`}`);
        lines.push('');
      }

      // Refresh stubs for labels / listviews referenced in onClick
      if (el.type === 'LISTVIEW' || el.type === 'LABEL') {
        lines.push(`if (typeof ${el.name} === 'undefined') {`);
        lines.push(`  var ${el.name} = { REFRESH: function() { _populate_${el.name} && _populate_${el.name}(); } };`);
        lines.push(`}`);
        lines.push('');
      }

      // Button click handlers
      if (el.type === 'BUTTON' && el.onClick) {
        lines.push(`function _handler_${el.name}(event) {`);
        let handler = el.onClick;
        // Translate la-if
        handler = handler.replace(/\bla-if\s*\(/g, 'if (');
        // SHOW ALERT "..." → alert("...")
        handler = handler.replace(/SHOW\s+ALERT\s+"([^"]+)"/g, 'alert("$1")');
        // SHOW CONFIRM "..." { ON YES { ... } } → if(confirm("...")) { ... }
        handler = handler.replace(/SHOW\s+CONFIRM\s+"([^"]+)"\s*\{[\s\S]*?ON\s+YES\s*\{([\s\S]*?)\}[\s\S]*?\}/g,
          (_, msg, yesBody) => `if (confirm("${msg}")) {\n${yesBody}\n}`);
        // .REFRESH() → ._refresh_() placeholder
        handler = handler.replace(/(\w+)\.REFRESH\(\)/g, '(typeof _populate_$1 === "function" && _populate_$1())');
        lines.push(handler);
        lines.push(`}`);
        lines.push('');
      }
    });

    // Init function for this window
    lines.push(`function _init_${win.name}() {`);
    win.elements.forEach(el => {
      if (el.bindTo) lines.push(`  _populate_${el.name} && _populate_${el.name}();`);
    });
    lines.push(`}`);
    lines.push('');

    return lines.join('\n');
  },

  _esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },

  /* ── Full HTML generation ──────────────────────────────────────── */
  generateFullHTML(turtleSrc, dslSrc, uidslSrc) {
    const dslJS = this.translateDSL(dslSrc);
    const { html: uiHTML, js: uiJS } = this.translateUIDSL(uidslSrc);

    // Parse window init calls
    const windowNames = [];
    const wr = /WINDOW\s+(\w+)/g;
    let wm;
    while ((wm = wr.exec(uidslSrc)) !== null) windowNames.push(wm[1]);
    const initCalls = windowNames.map(n => `_init_${n}();`).join('\n  ');

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSL1 Generated App</title>
<script src="https://unpkg.com/n3@1.17.2/browser/n3.min.js"><\/script>
<style>
  :root {
    --bg: #1e1e1e; --fg: #d4d4d4;
    --accent: #007acc; --border: #3c3c3c;
    --input-bg: #3c3c3c; --btn-bg: #252526;
    --success: #4ec9b0; --error: #f44747;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); padding: 20px; margin: 0; }
  h2.window-title { color: var(--accent); margin-bottom: 16px; font-size: 18px; }
  .dsl-window { max-width: 560px; margin: 0 auto; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #9d9d9d; margin-bottom: 4px; }
  .dsl-input, .dsl-select {
    width: 100%; padding: 8px 12px; background: var(--input-bg);
    border: 1px solid var(--border); border-radius: 4px; color: var(--fg); font-size: 14px;
  }
  .dsl-input:focus, .dsl-select:focus { outline: none; border-color: var(--accent); }
  .dsl-btn {
    padding: 8px 20px; border: 1px solid var(--border); background: var(--btn-bg);
    color: var(--fg); border-radius: 4px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; font-size: 13px;
  }
  .dsl-btn:hover { border-color: var(--accent); background: #37373d; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-secondary { background: #252526; }
  .btn-danger { background: #5a1d1d; border-color: #a02020; }
  .dsl-label { padding: 6px 0; color: #9d9d9d; font-size: 13px; margin-bottom: 8px; }
  .listview-wrapper { margin-top: 16px; }
  .listview-label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #9d9d9d; margin-bottom: 6px; }
  .dsl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dsl-table th { background: #252526; padding: 6px 8px; text-align: left; border: 1px solid var(--border); color: #9d9d9d; }
  .dsl-table td { padding: 5px 8px; border: 1px solid var(--border); }
  .dsl-table tr:hover td { background: #2a2d2e; }
</style>
</head>
<body>
${uiHTML}
<script>
// === Ontology Data (Turtle) ===
const _ontologyTurtle = ${JSON.stringify(turtleSrc)};

// === DSL Generated Code ===
${dslJS}

// === Load ontology into N3 store ===
function _loadOntology() {
  const parser = new N3.Parser({ format: 'Turtle' });
  try {
    const quads = parser.parse(_ontologyTurtle);
    quads.forEach(q => _store.addQuad(q));
    console.log('[DSL1] Loaded', quads.length, 'triples from ontology');
  } catch(e) {
    console.error('[DSL1] Ontology parse error:', e.message);
  }
}

// === UI Generated Code ===
${uiJS}

// === Initialization ===
window.addEventListener('DOMContentLoaded', function() {
  _loadOntology();
  ${initCalls}
});
<\/script>
</body>
</html>`;
  }
};

/* ═══════════════════════════════════════════════════════════════════
   4. ONTOLOGY MANAGER
═══════════════════════════════════════════════════════════════════ */
const OntoManager = {
  store: null,
  classes: [],
  properties: [],
  individuals: [],
  selectedClass: null,
  selectedIndividual: null,

  async parseTurtle(turtle) {
    this.classes = [];
    this.properties = [];
    this.individuals = [];

    try {
      const parser = new N3.Parser({ format: 'Turtle' });
      const quads = parser.parse(turtle);
      this.store = new N3.Store(quads);
      IDE.log(`Parsed ${quads.length} triples`, 'ok');
      document.getElementById('sb-triples').textContent = `${quads.length} triples`;
      this._extractClassesAndProperties(quads);
      return true;
    } catch (e) {
      IDE.log(`Parse error: ${e.message}`, 'err');
      return false;
    }
  },

  _extractClassesAndProperties(quads) {
    const OWL_CLASS = 'http://www.w3.org/2002/07/owl#Class';
    const OWL_OBJ   = 'http://www.w3.org/2002/07/owl#ObjectProperty';
    const OWL_DATA  = 'http://www.w3.org/2002/07/owl#DatatypeProperty';
    const RDF_TYPE  = 'http://www.w3.org/1999/02/22-rdf-syntax-ns#type';
    const RDFS_LABEL= 'http://www.w3.org/2000/01/rdf-schema#label';
    const RDFS_COMMENT = 'http://www.w3.org/2000/01/rdf-schema#comment';
    const RDFS_SUBCLASSOF = 'http://www.w3.org/2000/01/rdf-schema#subClassOf';
    const OWL_NAMED_IND = 'http://www.w3.org/2002/07/owl#NamedIndividual';

    const classSet = new Set();
    const propSet = new Set();
    const indSet = new Set();
    const labels = {};
    const comments = {};
    const parents = {};

    quads.forEach(q => {
      const s = q.subject.value, p = q.predicate.value, o = q.object.value;
      if (p === RDFS_LABEL) labels[s] = o;
      if (p === RDFS_COMMENT) comments[s] = o;
      if (p === RDFS_SUBCLASSOF) parents[s] = o;
      if (p === RDF_TYPE && o === OWL_CLASS) classSet.add(s);
      if (p === RDF_TYPE && (o === OWL_OBJ || o === OWL_DATA)) propSet.add(s);
      if (p === RDF_TYPE && o === OWL_NAMED_IND) indSet.add(s);
    });

    // Also detect classes used in type assertions
    quads.forEach(q => {
      if (q.predicate.value === RDF_TYPE && !['http://www.w3.org/2002/07/owl#Ontology',OWL_CLASS,OWL_OBJ,OWL_DATA,OWL_NAMED_IND].includes(q.object.value)) {
        classSet.add(q.object.value);
      }
    });

    this.classes = [...classSet].map(iri => ({
      iri,
      label: labels[iri] || this._localName(iri),
      comment: comments[iri] || '',
      parent: parents[iri] || ''
    }));
    this.properties = [...propSet].map(iri => ({
      iri,
      label: labels[iri] || this._localName(iri)
    }));
    this.individuals = [...indSet].map(iri => {
      // Find types from quads
      const types = quads
        .filter(q => q.subject.value === iri && q.predicate.value === RDF_TYPE && q.object.value !== OWL_NAMED_IND)
        .map(q => q.object.value);
      return { iri, label: labels[iri] || this._localName(iri), types };
    });
  },

  _localName(iri) {
    return iri.split(/[#/]/).pop() || iri;
  },

  renderClassTree() {
    const container = document.getElementById('class-tree');
    if (!this.classes.length) {
      container.innerHTML = '<div style="padding:12px;color:var(--text-muted)">No classes parsed yet. Edit turtle and click Parse.</div>';
      return;
    }
    container.innerHTML = this.classes.map(c => `
      <div class="tree-node ${this.selectedClass === c.iri ? 'selected' : ''}" onclick="OntoManager.selectClass('${c.iri.replace(/'/g,"\\'")}')" title="${c.iri}">
        <span class="icon">&#9670;</span>
        <span class="label">${c.label}</span>
        <span class="count">${this.individuals.filter(i => i.types.includes(c.iri)).length}</span>
      </div>`).join('');
  },

  renderIndividuals(filterClass) {
    const list = document.getElementById('individuals-list');
    const filter = document.getElementById('individual-class-filter');

    // Populate class filter
    filter.innerHTML = '<option value="">-- All Classes --</option>' +
      this.classes.map(c => `<option value="${c.iri}" ${filterClass === c.iri ? 'selected' : ''}>${c.label}</option>`).join('');

    const shown = filterClass
      ? this.individuals.filter(i => i.types.includes(filterClass))
      : this.individuals;

    if (!shown.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--text-muted)">No individuals found.</div>';
      return;
    }
    list.innerHTML = shown.map(ind => `
      <div class="individual-item ${this.selectedIndividual === ind.iri ? 'selected' : ''}"
           onclick="OntoManager.selectIndividual('${ind.iri.replace(/'/g,"\\'")}')" title="${ind.iri}">
        <span style="color:var(--success);font-size:11px;">&#9632;</span>
        <span>${ind.label}</span>
      </div>`).join('');
  },

  selectClass(iri) {
    this.selectedClass = iri;
    this.renderClassTree();
    const cls = this.classes.find(c => c.iri === iri);
    if (cls) {
      document.getElementById('edit-class-iri').value = cls.iri;
      document.getElementById('edit-class-label').value = cls.label;
      document.getElementById('edit-class-comment').value = cls.comment;
      document.getElementById('edit-class-parent').value = cls.parent;
      document.getElementById('class-edit-form').style.display = 'block';
    }
  },

  selectIndividual(iri) {
    this.selectedIndividual = iri;
    this.renderIndividuals(document.getElementById('individual-class-filter').value);
  },

  renderGraph() {
    const container = document.getElementById('onto-graph');
    if (!this.classes.length) {
      container.innerHTML = '<div style="padding:20px;color:var(--text-muted)">Parse turtle to visualize graph.</div>';
      return;
    }

    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();

    const colorMap = {
      default:   { background: '#1f3a5f', border: '#007acc', font: { color: '#d4d4d4' } },
      selected:  { background: '#2d5a8a', border: '#4ec9b0' },
    };

    this.classes.forEach((cls, i) => {
      nodes.add({ id: cls.iri, label: cls.label, title: cls.iri, color: colorMap.default, font: { color: '#d4d4d4' } });
    });

    // Add subClassOf edges from class data
    this.classes.forEach(cls => {
      if (cls.parent && nodes.get(cls.parent)) {
        edges.add({ from: cls.iri, to: cls.parent, label: 'subClassOf', arrows: 'to',
          color: { color: '#5a8a5a' }, font: { color: '#9d9d9d', size: 10 } });
      }
    });

    // Add property edges from store
    if (this.store) {
      const RDFS_DOMAIN = 'http://www.w3.org/2000/01/rdf-schema#domain';
      const RDFS_RANGE  = 'http://www.w3.org/2000/01/rdf-schema#range';
      const RDFS_LABEL  = 'http://www.w3.org/2000/01/rdf-schema#label';
      const labels = {};
      this.store.forEach(q => { if (q.predicate.value === RDFS_LABEL) labels[q.subject.value] = q.object.value; });

      this.store.forEach(q => {
        if (q.predicate.value === RDFS_DOMAIN) {
          const propIri = q.subject.value;
          const domainIri = q.object.value;
          // Find range
          let rangeIri = null;
          this.store.forEach(q2 => {
            if (q2.subject.value === propIri && q2.predicate.value === RDFS_RANGE) rangeIri = q2.object.value;
          });
          if (rangeIri && nodes.get(domainIri) && nodes.get(rangeIri)) {
            const propLabel = labels[propIri] || this._localName(propIri);
            edges.add({ from: domainIri, to: rangeIri, label: propLabel, arrows: 'to',
              color: { color: '#8a5a1f' }, font: { color: '#9d9d9d', size: 10 } });
          }
        }
      });
    }

    const options = {
      layout: { improvedLayout: true },
      physics: { stabilization: { iterations: 100 }, barnesHut: { gravitationalConstant: -3000 } },
      nodes: { shape: 'box', borderWidth: 1, font: { color: '#d4d4d4', size: 12 }, borderWidthSelected: 2 },
      edges: { font: { size: 10, color: '#9d9d9d' }, smooth: { type: 'continuous' } },
      interaction: { hover: true, tooltipDelay: 200 },
      background: { color: '#1e1e1e' }
    };

    try {
      new vis.Network(container, { nodes, edges }, options);
    } catch (e) {
      container.innerHTML = `<div style="padding:12px;color:var(--error)">Graph error: ${e.message}</div>`;
    }
  }
};

/* ═══════════════════════════════════════════════════════════════════
   5. MAIN IDE CONTROLLER
═══════════════════════════════════════════════════════════════════ */
const IDE = {
  editors: {},
  currentOntoTab: 'types',
  currentCodeTab: 'dsl',
  currentOutputTab: 'js',
  generatedHTML: '',

  init() {
    // Initialize CodeMirror editors
    this.editors.dsl = CodeMirror.fromTextArea(document.getElementById('dsl-editor-raw'), {
      mode: 'dsl1',
      theme: 'dracula',
      lineNumbers: true,
      foldGutter: true,
      matchBrackets: true,
      autoCloseBrackets: true,
      gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
      extraKeys: { 'Ctrl-/': 'toggleComment', 'Cmd-/': 'toggleComment' }
    });

    this.editors.uidsl = CodeMirror.fromTextArea(document.getElementById('uidsl-editor-raw'), {
      mode: 'uidsl',
      theme: 'dracula',
      lineNumbers: true,
      foldGutter: true,
      matchBrackets: true,
      autoCloseBrackets: true,
      gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
      extraKeys: { 'Ctrl-/': 'toggleComment', 'Cmd-/': 'toggleComment' }
    });

    this.editors.genjs = CodeMirror.fromTextArea(document.getElementById('genjs-editor-raw'), {
      mode: 'javascript',
      theme: 'dracula',
      lineNumbers: true,
      readOnly: true
    });

    // Set example content
    this.editors.dsl.setValue(EXAMPLE_DSL);
    this.editors.uidsl.setValue(EXAMPLE_UIDSL);
    document.getElementById('turtle-textarea').value = EXAMPLE_TURTLE;

    // Cursor position in status bar
    this.editors.dsl.on('cursorActivity', () => {
      const pos = this.editors.dsl.getCursor();
      document.getElementById('sb-lines').textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
    });

    // Init Split.js for resizable panels
    try {
      Split(['#left-panel', '#mid-panel', '#right-panel'], {
        sizes: [25, 45, 30],
        minSize: [180, 200, 200],
        gutterSize: 5,
        direction: 'horizontal',
        onDragEnd: () => {
          Object.values(this.editors).forEach(ed => ed.refresh && ed.refresh());
        }
      });
    } catch (e) {
      console.warn('Split.js failed:', e);
    }

    // Parse initial turtle
    OntoManager.parseTurtle(EXAMPLE_TURTLE).then(() => {
      OntoManager.renderClassTree();
      OntoManager.renderIndividuals('');
    });

    this.log('DSL1 IDE initialized.', 'ok');
  },

  /* ── Tab switching ────────────────────────────────────────────── */
  switchOntoTab(tab) {
    this.currentOntoTab = tab;
    ['types','individuals','graph','turtle'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    const tabs = document.querySelectorAll('#onto-tabs .tab');
    const tabMap = { types: 0, individuals: 1, graph: 2, turtle: 3 };
    tabs.forEach((el, i) => el.classList.toggle('active', i === tabMap[tab]));
    if (tab === 'graph') {
      setTimeout(() => OntoManager.renderGraph(), 50);
    }
    if (tab === 'individuals') {
      OntoManager.renderIndividuals('');
    }
  },

  switchCodeTab(tab) {
    this.currentCodeTab = tab;
    ['dsl','uidsl'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    const tabs = document.querySelectorAll('#mid-panel .tabs .tab');
    tabs.forEach((el, i) => el.classList.toggle('active', i === (tab === 'dsl' ? 0 : 1)));
    if (tab === 'dsl') document.getElementById('sb-mode').textContent = 'DSL Mode';
    else document.getElementById('sb-mode').textContent = 'UI DSL Mode';
    setTimeout(() => { this.editors[tab] && this.editors[tab].refresh(); }, 50);
  },

  switchOutputTab(tab) {
    this.currentOutputTab = tab;
    ['js','preview'].forEach(t => {
      document.getElementById(`tab-gen${t === 'js' ? 'js' : 'preview'}`).classList.toggle('active', t === tab);
    });
    // Map tab names properly
    document.getElementById('tab-genjs').classList.toggle('active', tab === 'js');
    document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
    const tabs = document.querySelectorAll('#right-panel .tabs .tab');
    tabs.forEach((el, i) => el.classList.toggle('active', i === (tab === 'js' ? 0 : 1)));
    if (tab === 'js') setTimeout(() => this.editors.genjs.refresh(), 50);
  },

  /* ── Core actions ─────────────────────────────────────────────── */
  translate() {
    this.setStatus('Translating...');
    try {
      const turtle = document.getElementById('turtle-textarea').value;
      const dsl = this.editors.dsl.getValue();
      const uidsl = this.editors.uidsl.getValue();
      this.generatedHTML = Translator.generateFullHTML(turtle, dsl, uidsl);
      this.editors.genjs.setValue(this.generatedHTML);
      this.switchOutputTab('js');
      this.log('Translation complete.', 'ok');
      this.setStatus('Translated OK');
    } catch (e) {
      this.log(`Translation error: ${e.message}`, 'err');
      this.setStatus('Translation failed');
      this.editors.genjs.setValue('// Error: ' + e.message + '\n// ' + e.stack);
    }
  },

  runPreview() {
    if (!this.generatedHTML) this.translate();
    try {
      const iframe = document.getElementById('preview-iframe');
      const blob = new Blob([this.generatedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      iframe.src = url;
      this.switchOutputTab('preview');
      this.log('Preview loaded.', 'ok');
      this.setStatus('Preview running');
    } catch (e) {
      this.log(`Preview error: ${e.message}`, 'err');
    }
  },

  exportJS() {
    if (!this.generatedHTML) this.translate();
    const blob = new Blob([this.generatedHTML], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dsl1-app.html';
    a.click();
    this.log('Exported dsl1-app.html', 'ok');
  },

  /* ── Ontology operations ──────────────────────────────────────── */
  parseTurtle() {
    const turtle = document.getElementById('turtle-textarea').value;
    OntoManager.parseTurtle(turtle).then(ok => {
      if (ok) {
        OntoManager.renderClassTree();
        OntoManager.renderIndividuals('');
        this.setStatus('Turtle parsed');
      }
    });
  },

  refreshGraph() {
    OntoManager.renderGraph();
  },

  addClass() {
    const name = prompt('Class name (e.g. calc:MyClass):');
    if (!name) return;
    const turtle = document.getElementById('turtle-textarea').value;
    const newTriple = `\n${name}\n    a owl:Class ;\n    rdfs:label "${name.split(':').pop()}" .\n`;
    document.getElementById('turtle-textarea').value = turtle + newTriple;
    this.log(`Added class ${name}`, 'ok');
    this.parseTurtle();
  },

  addProperty() {
    const name = prompt('Property name (e.g. calc:myProp):');
    if (!name) return;
    const turtle = document.getElementById('turtle-textarea').value;
    const newTriple = `\n${name}\n    a owl:DatatypeProperty ;\n    rdfs:label "${name.split(':').pop()}" .\n`;
    document.getElementById('turtle-textarea').value = turtle + newTriple;
    this.log(`Added property ${name}`, 'ok');
    this.parseTurtle();
  },

  saveClassEdit() {
    const iri = document.getElementById('edit-class-iri').value;
    const label = document.getElementById('edit-class-label').value;
    const comment = document.getElementById('edit-class-comment').value;
    const cls = OntoManager.classes.find(c => c.iri === iri);
    if (cls) {
      cls.label = label;
      cls.comment = comment;
      OntoManager.renderClassTree();
      this.log(`Saved class ${label}`, 'ok');
    }
    document.getElementById('class-edit-form').style.display = 'none';
  },

  cancelClassEdit() {
    document.getElementById('class-edit-form').style.display = 'none';
  },

  addIndividual() {
    const name = prompt('Individual IRI (e.g. calc:myInstance):');
    if (!name) return;
    const classFilter = document.getElementById('individual-class-filter').value;
    const turtle = document.getElementById('turtle-textarea').value;
    const typeTriple = classFilter ? `\n    a <${classFilter}> , owl:NamedIndividual ;` : '\n    a owl:NamedIndividual ;';
    const newTriple = `\n${name}\n${typeTriple}\n    rdfs:label "${name.split(':').pop()}" .\n`;
    document.getElementById('turtle-textarea').value = turtle + newTriple;
    this.log(`Added individual ${name}`, 'ok');
    this.parseTurtle();
    setTimeout(() => OntoManager.renderIndividuals(classFilter), 200);
  },

  deleteIndividual() {
    const iri = OntoManager.selectedIndividual;
    if (!iri) { alert('Select an individual first.'); return; }
    if (!confirm(`Delete individual ${iri}?`)) return;
    OntoManager.individuals = OntoManager.individuals.filter(i => i.iri !== iri);
    OntoManager.selectedIndividual = null;
    OntoManager.renderIndividuals(document.getElementById('individual-class-filter').value);
    this.log(`Deleted individual ${iri}`, 'ok');
  },

  filterIndividuals() {
    const val = document.getElementById('individual-class-filter').value;
    OntoManager.renderIndividuals(val);
  },

  /* ── Workspace ────────────────────────────────────────────────── */
  newWorkspace() {
    if (!confirm('Clear all editors and start fresh?')) return;
    document.getElementById('turtle-textarea').value = '';
    this.editors.dsl.setValue('');
    this.editors.uidsl.setValue('');
    this.editors.genjs.setValue('');
    OntoManager.classes = []; OntoManager.properties = []; OntoManager.individuals = [];
    OntoManager.renderClassTree();
    this.log('New workspace created.', 'ok');
  },

  openFile() {
    const input = document.getElementById('file-input');
    input.onchange = (e) => this._handleFileOpen(e);
    input.click();
  },

  _handleFileOpen(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const content = ev.target.result;
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'ttl') {
        document.getElementById('turtle-textarea').value = content;
        this.parseTurtle();
        this.switchOntoTab('turtle');
      } else if (ext === 'dsl') {
        this.editors.dsl.setValue(content);
        this.switchCodeTab('dsl');
      } else if (ext === 'uidsl') {
        this.editors.uidsl.setValue(content);
        this.switchCodeTab('uidsl');
      } else if (ext === 'json') {
        try {
          const ws = JSON.parse(content);
          if (ws.turtle) document.getElementById('turtle-textarea').value = ws.turtle;
          if (ws.dsl) this.editors.dsl.setValue(ws.dsl);
          if (ws.uidsl) this.editors.uidsl.setValue(ws.uidsl);
          this.parseTurtle();
        } catch (err) { this.log(`JSON parse error: ${err.message}`, 'err'); }
      }
      this.log(`Opened: ${file.name}`, 'ok');
    };
    reader.readAsText(file);
    e.target.value = '';
  },

  saveWorkspace() {
    const ws = {
      version: '1.0',
      saved: new Date().toISOString(),
      turtle: document.getElementById('turtle-textarea').value,
      dsl: this.editors.dsl.getValue(),
      uidsl: this.editors.uidsl.getValue()
    };
    const blob = new Blob([JSON.stringify(ws, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dsl1-workspace.json';
    a.click();
    this.log('Workspace saved as dsl1-workspace.json', 'ok');
  },

  /* ── Utilities ────────────────────────────────────────────────── */
  log(msg, type) {
    const console = document.getElementById('console-output');
    const div = document.createElement('div');
    div.className = `log-line ${type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : type === 'ok' ? 'log-ok' : ''}`;
    div.textContent = `[${new Date().toTimeString().slice(0,8)}] ${msg}`;
    console.appendChild(div);
    console.scrollTop = console.scrollHeight;
  },

  setStatus(msg) {
    document.getElementById('toolbar-status').textContent = msg;
    setTimeout(() => { document.getElementById('toolbar-status').textContent = 'Ready'; }, 3000);
  }
};

// Start IDE when DOM is ready
document.addEventListener('DOMContentLoaded', () => IDE.init());
</script>
